spring.application.name=bai4_qlsp_LeBinh

# MySQL connection
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/furniture_shop?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=Thinhnguyen1@

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.delivery.seed.enabled=false
app.auth.secret=domora-secret-key-2026
app.auth.expiration-seconds=604800

app.oauth2.redirect-uri=http://localhost:5173/oauth2/success

# Public base url
app.public-base-url=https://closure-heights-even-poem.trycloudflare.com

# VNPay
app.vnpay.tmn-code=OR3CYY1U
app.vnpay.hash-secret=YPO99EIH3TGMUT7H62ACWRIKGF4YLPR9
app.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.vnpay.return-url=${app.public-base-url}/api/payment/vnpay/return
app.vnpay.ipn-url=${app.public-base-url}/api/payment/vnpay/ipn
app.vnpay.frontend-result-url=http://localhost:5173/payment/vnpay/result

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# Gemini AI
app.ai.enabled=true
app.ai.api-key=${GEMINI_API_KEY:}
app.ai.base-url=https://generativelanguage.googleapis.com
app.ai.api-version=v1beta
app.ai.fallback-api-versions=v1
app.ai.model=gemini-2.5-flash
app.ai.fallback-models=gemini-1.5-flash-8b,gemini-2.0-flash,gemini-2.0-flash-lite
app.ai.timeout-seconds=15
app.ai.temperature=0.4
app.ai.max-output-tokens=500

app.upload.dir=uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Frontend
app.frontend.base-url=http://localhost:5173
app.reset-password.base-url=${app.frontend.base-url}/reset-password

# Mail
app.mail.from=${MAIL_FROM:${spring.mail.username}}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
